name: Elixir

on:
  push:
    branches: [main]
    paths:
      - "elixir/**"
      - ".github/workflows/elixir.yml"
  pull_request:
    paths:
      - "elixir/**"
      - ".github/workflows/elixir.yml"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.15'
          otp-version: '26'

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            elixir/deps
            elixir/_build
          key: elixir-${{ hashFiles('elixir/mix.lock') }}
          restore-keys: elixir-

      - name: Install dependencies
        working-directory: elixir
        run: mix deps.get

      - name: Compile
        working-directory: elixir
        run: mix compile --warnings-as-errors

      - name: Check formatting
        working-directory: elixir
        run: mix format --check-formatted

      - name: Run tests
        working-directory: elixir
        run: mix test
