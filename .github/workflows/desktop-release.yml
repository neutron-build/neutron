name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Build + sign + bundle on each platform
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            label: macOS-arm64
            target: aarch64-apple-darwin
            os: darwin
            arch: arm64
            bundle_targets: "dmg"

          - runner: macos-13
            label: macOS-x86_64
            target: x86_64-apple-darwin
            os: darwin
            arch: x86_64
            bundle_targets: "dmg"

          - runner: windows-latest
            label: Windows-x86_64
            target: x86_64-pc-windows-msvc
            os: windows
            arch: x86_64
            bundle_targets: "nsis"

          - runner: ubuntu-22.04
            label: Linux-x86_64
            target: x86_64-unknown-linux-gnu
            os: linux
            arch: x86_64
            bundle_targets: "deb,appimage"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- System dependencies ----

      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # ---- Toolchains ----

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop
          key: release-${{ matrix.target }}

      # ---- macOS: Import signing certificate ----

      - name: Import macOS signing certificate
        if: matrix.os == 'darwin'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Set key partition list (allows codesign to access the key)
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to keychain search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Clean up cert file
          rm -f "$CERT_PATH"

      # ---- Windows: Import signing certificate ----

      - name: Import Windows signing certificate
        if: matrix.os == 'windows'
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: powershell
        run: |
          if ($env:WINDOWS_CERTIFICATE) {
            $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
            $pfxPath = Join-Path $env:RUNNER_TEMP "certificate.pfx"
            [IO.File]::WriteAllBytes($pfxPath, $certBytes)

            $securePassword = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
            Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword

            Remove-Item -Path $pfxPath -Force
            Write-Host "Certificate imported successfully"
          } else {
            Write-Host "No WINDOWS_CERTIFICATE secret set, skipping certificate import"
          }

      # ---- Build the Tauri app ----

      - name: Install frontend dependencies
        working-directory: desktop/examples/starter
        run: |
          echo '{}' > package.json
          echo "No npm deps needed for the starter frontend"

      - name: Build Tauri app
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cargo install tauri-cli --version "^2" --locked
          cargo tauri build \
            --target ${{ matrix.target }} \
            --bundles ${{ matrix.bundle_targets }} \
            --config examples/starter/src-tauri/tauri.conf.json

      # ---- macOS: Sign + Notarize ----

      - name: Sign and notarize macOS app
        if: matrix.os == 'darwin'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          chmod +x desktop/scripts/sign-macos.sh

          # Find the .app bundle
          APP_BUNDLE=$(find desktop/target/${{ matrix.target }}/release/bundle -name "*.app" -type d | head -1)
          if [[ -n "$APP_BUNDLE" && -n "$APPLE_SIGNING_IDENTITY" ]]; then
            desktop/scripts/sign-macos.sh "$APP_BUNDLE"
          else
            echo "Skipping signing (no app bundle found or APPLE_SIGNING_IDENTITY not set)"
          fi

      # ---- Windows: Sign installer ----

      - name: Sign Windows installer
        if: matrix.os == 'windows'
        env:
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
        shell: powershell
        run: |
          if ($env:WINDOWS_CERTIFICATE_THUMBPRINT) {
            $installer = Get-ChildItem -Path "desktop\target\${{ matrix.target }}\release\bundle\nsis\*.exe" | Select-Object -First 1
            if ($installer) {
              & desktop\scripts\sign-windows.ps1 -AppPath $installer.FullName
            } else {
              Write-Host "No installer found to sign"
            }
          } else {
            Write-Host "Skipping signing (WINDOWS_CERTIFICATE_THUMBPRINT not set)"
          }

      # ---- Extract version ----

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/desktop-}" >> "$GITHUB_OUTPUT"

      # ---- Collect artifacts ----

      - name: Collect macOS artifacts
        if: matrix.os == 'darwin'
        id: collect_macos
        run: |
          ARTIFACTS_DIR="$RUNNER_TEMP/artifacts"
          mkdir -p "$ARTIFACTS_DIR"

          # DMG
          find desktop/target/${{ matrix.target }}/release/bundle -name "*.dmg" -exec cp {} "$ARTIFACTS_DIR/" \;

          # Rename for clarity
          for f in "$ARTIFACTS_DIR"/*.dmg; do
            mv "$f" "$ARTIFACTS_DIR/NeutronDesktop-${{ steps.version.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}.dmg"
          done

          echo "dir=$ARTIFACTS_DIR" >> "$GITHUB_OUTPUT"

      - name: Collect Windows artifacts
        if: matrix.os == 'windows'
        id: collect_windows
        shell: bash
        run: |
          ARTIFACTS_DIR="$RUNNER_TEMP/artifacts"
          mkdir -p "$ARTIFACTS_DIR"

          # NSIS installer
          find desktop/target/${{ matrix.target }}/release/bundle -name "*.exe" -exec cp {} "$ARTIFACTS_DIR/" \;

          for f in "$ARTIFACTS_DIR"/*.exe; do
            mv "$f" "$ARTIFACTS_DIR/NeutronDesktop-${{ steps.version.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}-setup.exe"
          done

          echo "dir=$ARTIFACTS_DIR" >> "$GITHUB_OUTPUT"

      - name: Collect Linux artifacts
        if: matrix.os == 'linux'
        id: collect_linux
        run: |
          ARTIFACTS_DIR="$RUNNER_TEMP/artifacts"
          mkdir -p "$ARTIFACTS_DIR"

          # .deb
          find desktop/target/${{ matrix.target }}/release/bundle -name "*.deb" -exec cp {} "$ARTIFACTS_DIR/" \;

          # .AppImage
          find desktop/target/${{ matrix.target }}/release/bundle -name "*.AppImage" -exec cp {} "$ARTIFACTS_DIR/" \;

          # Rename for clarity
          for f in "$ARTIFACTS_DIR"/*.deb; do
            [ -f "$f" ] && mv "$f" "$ARTIFACTS_DIR/NeutronDesktop-${{ steps.version.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}.deb"
          done
          for f in "$ARTIFACTS_DIR"/*.AppImage; do
            [ -f "$f" ] && mv "$f" "$ARTIFACTS_DIR/NeutronDesktop-${{ steps.version.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}.AppImage"
          done

          echo "dir=$ARTIFACTS_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/artifacts/*
          retention-days: 1

  # ---------------------------------------------------------------------------
  # GitHub Release: collect all platform builds, checksum, publish
  # ---------------------------------------------------------------------------
  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: |
          sha256sum NeutronDesktop-* > checksums.txt
          cat checksums.txt

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/desktop-}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Neutron Desktop ${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            artifacts/NeutronDesktop-*
            artifacts/checksums.txt
          body: |
            ## Neutron Desktop ${{ steps.version.outputs.version }}

            Cross-platform desktop application built with Tauri 2.0 and the Neutron framework.

            ### Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | macOS | Apple Silicon | `NeutronDesktop-${{ steps.version.outputs.version }}-darwin-arm64.dmg` |
            | macOS | Intel | `NeutronDesktop-${{ steps.version.outputs.version }}-darwin-x86_64.dmg` |
            | Windows | x86_64 | `NeutronDesktop-${{ steps.version.outputs.version }}-windows-x86_64-setup.exe` |
            | Linux | x86_64 | `NeutronDesktop-${{ steps.version.outputs.version }}-linux-x86_64.deb` |
            | Linux | x86_64 | `NeutronDesktop-${{ steps.version.outputs.version }}-linux-x86_64.AppImage` |

            ### Verify checksums

            ```bash
            sha256sum -c checksums.txt
            ```

            ### Code signing

            - **macOS**: Signed with Developer ID and notarized by Apple
            - **Windows**: Signed with EV code signing certificate
            - **Linux**: Unsigned (verify via checksum)
