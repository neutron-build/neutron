name: Nucleus Database Engine

on:
  push:
    branches: [main]
    paths:
      - "nucleus/**"
      - ".github/workflows/nucleus.yml"
  pull_request:
    paths:
      - "nucleus/**"
      - ".github/workflows/nucleus.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: nucleus

      - name: Build
        run: cargo build
        working-directory: nucleus

      - name: Test (lib only — skips slow stress tests)
        run: cargo test --lib -q
        working-directory: nucleus

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: nucleus
      - run: cargo clippy -- -D warnings
        working-directory: nucleus

  docs:
    name: Doc Metrics Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate doc metrics match source code
        run: sh scripts/metrics.sh --check
        working-directory: nucleus
