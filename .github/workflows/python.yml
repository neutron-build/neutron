name: Python

on:
  push:
    branches: [main]
    paths:
      - "python/**"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "python/**"
      - ".github/workflows/python.yml"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: python
        run: pip install -e ".[test]"

      - name: Run tests
        working-directory: python
        run: pytest -v
