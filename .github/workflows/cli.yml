name: Universal CLI

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - ".github/workflows/cli.yml"
    tags:
      - "cli/v*"
  pull_request:
    paths:
      - "cli/**"
      - ".github/workflows/cli.yml"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: cli/go.sum

      - name: Build
        run: go build -v .
        working-directory: cli

      - name: Test
        run: go test -race ./...
        working-directory: cli

      - name: Vet
        run: go vet ./...
        working-directory: cli

  cross-compile:
    name: Cross-compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: cli/go.sum

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -o /dev/null .
        working-directory: cli

  release:
    name: Release
    needs: [test, cross-compile]
    if: startsWith(github.ref, 'refs/tags/cli/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: cli/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
          workdir: cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
