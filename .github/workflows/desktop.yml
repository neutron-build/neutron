name: Desktop (Tauri)

on:
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - ".github/workflows/desktop.yml"
  pull_request:
    paths:
      - "desktop/**"
      - ".github/workflows/desktop.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check Library Crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - name: Build (library crates only)
        run: cargo build --workspace --exclude neutron-desktop-starter
        working-directory: desktop

      - name: Clippy (library crates only)
        run: cargo clippy --workspace --exclude neutron-desktop-starter -- -D warnings
        working-directory: desktop
