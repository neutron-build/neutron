name: Modelica CI

on:
  push:
    branches: [main]
    paths:
      - 'modelica/**'
      - '.github/workflows/modelica.yml'
  pull_request:
    branches: [main]
    paths:
      - 'modelica/**'
      - '.github/workflows/modelica.yml'

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: modelica
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ai]"

      - name: Run tests
        working-directory: modelica
        run: |
          python -m pytest tests/ -v --tb=short -x

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint neutron_sim
        working-directory: modelica
        run: ruff check neutron_sim/ --select E,F,W --ignore E501

      - name: Lint neutron_modelica
        working-directory: modelica
        run: ruff check neutron_modelica/ --select E,F,W --ignore E501

      - name: Lint tests
        working-directory: modelica
        run: ruff check tests/ --select E,F,W --ignore E501
