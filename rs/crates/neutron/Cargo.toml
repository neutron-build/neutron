[package]
name = "neutron"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Neutron Rust — convention-driven application framework"

# ---------------------------------------------------------------------------
# Features
#
# Three usage tiers:
#
#   default-features = false          → bare core: router + handler +
#                                       middleware + extractors. Zero JSON,
#                                       zero logging, zero crypto. Ideal for
#                                       embedded, WASM, minimal binaries.
#
#   features = ["web"]                → standard HTTP API server: JSON, forms,
#                                       CORS, auth, TLS, compression, logging.
#                                       Everything a typical REST API needs.
#
#   features = ["full"] (default)     → all of the above plus rate limiting,
#                                       circuit breaking, caching, metrics,
#                                       pub/sub, SSE, WebSocket, OpenAPI, etc.
# ---------------------------------------------------------------------------
[features]
default = ["full"]

# ── Preset bundles ──────────────────────────────────────────────────────────

# Standard web API — auth, JSON, logging, TLS, compression, CORS
web = [
    "json", "form", "logging",
    "cors", "timeout", "body-limit", "catch-panic", "helmet",
    "request-id", "health", "validate",
    "tls", "compress", "jwt", "cookie",
]

# Everything — maximum capability, no trade-offs
full = [
    "web",
    "rate-limit", "circuit-breaker", "cache", "dedup",
    "metrics", "pubsub", "sse", "static-files", "data",
    "negotiate", "tracing-mw", "ws", "multipart", "openapi",
    "testing",
]

# ── Serialization ───────────────────────────────────────────────────────────

# JSON body parsing + JSON responses (adds serde + serde_json)
json = ["dep:serde_json", "dep:serde"]

# Form body parsing + Query<T: Deserialize> (adds serde + serde_urlencoded)
form = ["dep:serde_urlencoded", "dep:serde"]

# ── Logging & tracing ───────────────────────────────────────────────────────

# Structured request/response logging (adds tracing-subscriber)
# Note: tracing macros are always available in core (zero overhead without subscriber)
logging = ["dep:tracing-subscriber"]

# Distributed tracing layer (OpenTelemetry-compatible spans)
tracing-mw = ["logging"]

# ── Stateless middleware (no extra deps) ────────────────────────────────────
cors            = []
timeout         = []
body-limit      = []
catch-panic     = []
helmet          = []

# ── Infrastructure middleware (no extra deps) ───────────────────────────────
rate-limit      = []
circuit-breaker = []
cache           = ["dep:sha2"]
dedup           = []

# ── Observability (no extra deps) ───────────────────────────────────────────
metrics         = []

# ── Endpoints & utilities (no extra deps) ───────────────────────────────────
health          = []
validate        = []
negotiate       = []

# ── Request ID (needs crypto for unique ID generation) ──────────────────────
request-id      = ["dep:sha2", "dep:rand"]

# ── Real-time ───────────────────────────────────────────────────────────────
sse             = ["dep:tokio-stream"]   # Server-Sent Events
pubsub          = []                     # In-memory pub/sub (uses tokio::sync)

# ── Data & loading ──────────────────────────────────────────────────────────
data            = []                     # DataLoader + join_all / try_join_all
static-files    = []                     # Static file serving + NamedFile

# ── Testing ─────────────────────────────────────────────────────────────────
testing         = []                     # TestClient (no TCP testing harness)

# ── Optional protocol features (already gated, unchanged) ───────────────────
tls             = ["dep:rustls", "dep:tokio-rustls", "dep:rustls-pemfile"]
compress        = ["dep:flate2", "dep:brotli"]
ws              = ["dep:fastwebsockets", "dep:sha1", "dep:base64"]
multipart       = ["dep:multer"]
jwt             = ["dep:hmac", "dep:base64"]
cookie          = ["dep:aes-gcm", "dep:hmac", "dep:base64", "dep:rand", "dep:sha2", "dep:serde_urlencoded", "dep:serde", "dep:serde_json"]
openapi         = []

# ── Performance ceiling (opt-in, additive) ───────────────────────────────────

# Replace serde_json with simd-json for JSON body parsing.
# ~2–4× faster JSON decode on x86-64 with AVX2.  Requires nightly SIMD
# intrinsics on non-x86 targets; falls back silently on unsupported hardware.
simd-json       = ["dep:simd-json"]

# Use jemalloc as the global allocator (Linux / macOS only).
# Reduces memory fragmentation and improves multi-threaded allocation throughput.
# Enable in the *binary* crate (not a library) for best results.
jemalloc        = ["dep:tikv-jemallocator"]

# Use mimalloc as the global allocator (cross-platform alternative to jemalloc).
# Similar throughput gains on Windows where jemalloc is unavailable.
mimalloc        = ["dep:mimalloc"]

# HTTP/3 support via QUIC.
# Requires TLS certificates (QUIC always uses TLS 1.3).
# Adds quinn (QUIC transport) + h3 (HTTP/3 framing) + h3-quinn (glue).
http3           = ["dep:quinn", "dep:h3", "dep:h3-quinn", "tls"]

# Tower middleware compatibility — use tower-http layers alongside Neutron middleware.
tower-compat    = ["dep:tower", "dep:tower-service", "dep:tower-layer", "dep:futures-util"]

# ---------------------------------------------------------------------------
# Dependencies
# ---------------------------------------------------------------------------
[dependencies]

# ── Always required — the engine ────────────────────────────────────────────
tokio          = { workspace = true }
hyper          = { workspace = true }
hyper-util     = { workspace = true }
http-body-util = { workspace = true }
http-body      = { workspace = true }
http           = { workspace = true }
bytes          = { workspace = true }
matchit        = { workspace = true }
smallvec       = { workspace = true }
socket2        = { workspace = true }
# tracing macros are always available — they compile to nothing without a
# subscriber, so the core pays zero runtime cost. Only tracing-subscriber
# (the actual log output infrastructure) is feature-gated behind "logging".
tracing        = { workspace = true }

# ── Feature-gated — pulled in only when the feature is enabled ──────────────
serde            = { workspace = true, optional = true }
serde_json       = { workspace = true, optional = true }
serde_urlencoded = { workspace = true, optional = true }
tracing-subscriber = { workspace = true, optional = true }
sha2             = { workspace = true, optional = true }
rand             = { workspace = true, optional = true }
tokio-stream     = { workspace = true, optional = true }

# ── Already optional (protocol features — unchanged) ────────────────────────
rustls         = { workspace = true, optional = true }
tokio-rustls   = { workspace = true, optional = true }
rustls-pemfile = { workspace = true, optional = true }
flate2         = { workspace = true, optional = true }
brotli         = { workspace = true, optional = true }
fastwebsockets = { workspace = true, optional = true }
sha1           = { workspace = true, optional = true }
multer         = { workspace = true, optional = true }
hmac           = { workspace = true, optional = true }
aes-gcm        = { workspace = true, optional = true }
base64         = { workspace = true, optional = true }

# ── Phase 5 — performance ceiling ────────────────────────────────────────────
simd-json          = { version = "0.13", features = ["serde_impl"], optional = true }
tikv-jemallocator  = { version = "0.5", optional = true }
mimalloc           = { version = "0.1", default-features = false, optional = true }

# ── HTTP/3 ────────────────────────────────────────────────────────────────────
quinn    = { workspace = true, optional = true }
h3       = { workspace = true, optional = true }
h3-quinn = { workspace = true, optional = true }

# ── Tower compatibility ──────────────────────────────────────────────────────
tower         = { version = "0.5", optional = true, default-features = false }
tower-service = { version = "0.3", optional = true }
tower-layer   = { version = "0.3", optional = true }
futures-util  = { workspace = true, optional = true }

[dev-dependencies]
async-stream = { workspace = true }
tempfile     = { workspace = true }
criterion    = { workspace = true }
rcgen        = { workspace = true }

[[bench]]
name = "router"
harness = false

[[bench]]
name = "pipeline"
harness = false

[[example]]
name = "hello"
path = "examples/hello.rs"

[[example]]
name = "bench"
path = "examples/bench.rs"

[[example]]
name = "rest_api"
path = "examples/rest_api.rs"

[[example]]
name = "realtime"
path = "examples/realtime.rs"
