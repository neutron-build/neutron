[package]
name = "neutron-rpc"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Typed RPC layer over gRPC for the Neutron framework"

[dependencies]
neutron-grpc = { path = "../neutron-grpc" }
neutron      = { path = "../neutron", default-features = false }
bytes        = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
http         = { workspace = true }
tracing      = { workspace = true }
# Optional Protobuf codec via prost.
prost = { workspace = true, optional = true }

[features]
# Enable the `Proto<T>` newtype wrapper for prost-generated message types.
protobuf = ["dep:prost"]

[dev-dependencies]
tokio          = { workspace = true }
http-body-util = { workspace = true }
