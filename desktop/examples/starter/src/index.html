<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Neutron Starter</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 40px; background: #0a0a0a; color: #e5e5e5; }
    h1 { font-size: 2rem; }
    pre { background: #1a1a1a; padding: 16px; border-radius: 8px; overflow-x: auto; }
    button { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #2563eb; }
    #result { margin-top: 16px; }
  </style>
</head>
<body>
  <h1>Neutron Desktop</h1>
  <p>Click the button to call the Rust backend via the <code>neutron://</code> protocol.</p>
  <button onclick="callApi()">Call /api/hello</button>
  <pre id="result">waiting...</pre>
  <script>
    async function callApi() {
      try {
        const res = await fetch('neutron://localhost/api/hello');
        const data = await res.json();
        document.getElementById('result').textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById('result').textContent = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
