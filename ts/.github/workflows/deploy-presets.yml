name: Deploy Presets

on:
  pull_request:
    paths:
      - "packages/**"
      - "apps/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/deploy-presets.yml"
  push:
    branches:
      - main
    paths:
      - "packages/**"
      - "apps/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/deploy-presets.yml"
  workflow_dispatch:

jobs:
  deploy-presets:
    name: Deploy Preset Validation
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Deploy Preset CI
        run: pnpm run ci:deploy-presets

