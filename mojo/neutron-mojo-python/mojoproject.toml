[project]
name = "neutron-mojo-python"
version = "0.1.0"
description = "Python interop — DLPack bridge, torch.compile backend, weight loading"
license = "Apache-2.0"
authors = ["Tyler <tyler@tystack.dev>"]
readme = "README.md"

[project.urls]
homepage = "https://github.com/tylerbarron/tystack"
repository = "https://github.com/tylerbarron/tystack/tree/main/mojo/neutron-mojo-python"

[build-system]
channels = ["conda-forge", "modular"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64"]

[dependencies]
max = ">=25.1"
neutron-mojo = { path = "../neutron-mojo" }

[tool.mojo]
src = "src"
test = "test"

[tool.mojo.python]
packages = ["python/neutron_mojo"]
